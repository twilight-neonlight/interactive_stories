<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Stories</title>
<link rel="stylesheet" href="./game.css">
<script src="../scenario-loader.js" defer></script>
<script src="../state/GameState.js" defer></script>
<script src="../state/StateManager.js" defer></script>
<script src="../scenario-ui.js?v=20260430-field-army" defer></script>
<script src="./api.js" defer></script>
<script src="./nav.js" defer></script>
<script src="./game-tooltip.js" defer></script>
<script src="./game-markdown.js?v=20260430-choice-cut" defer></script>
<script src="./game-ui.js" defer></script>
<script src="./game-turn.js" defer></script>
<script src="./combat-ui.js" defer></script>
<script src="./game-init.js" defer></script>
</head>
<body>

<div class="tooltip" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-sub"  id="tt-sub"></div>
  <div class="tt-body" id="tt-body"></div>
  <hr  class="tt-divider" id="tt-div" style="display:none">
  <div id="tt-rows"></div>
  <div id="tt-tags"></div>
</div>

<div id="combat-overlay"></div>

<div class="shell">

  <!-- 좌측 -->
  <div class="left-col">
    <div class="panel" id="commander-panel" style="flex:1; min-height:0;"></div>

    <div class="panel scroll-panel" style="flex:2;">
      <div class="panel-label">주요 인물</div>
      <div class="scroll-inner" id="character-list"></div>
    </div>

    <div class="panel scroll-panel" style="flex:2;">
      <div class="panel-label">세력 현황</div>
      <div class="scroll-inner" id="faction-bars"></div>
    </div>
  </div>

  <!-- 중앙 -->
  <div class="center-col">
    <div class="panel scene-panel">
      <div class="scene-header">
        <div class="scene-badge" id="chapter-badge">1장</div>
        <div class="scene-badge" id="scene-badge">SCENE 1</div>
        <div class="chapter-info" id="chapter-info">—</div>
        <div class="resolution-badge" id="resolution-badge" style="display:none;"></div>
        <div class="save-bar">
          <button class="save-btn" id="save-btn" onclick="saveToServer()" title="현재 상태를 서버에 저장">저장</button>
          <a class="save-btn" href="main_menu.html" title="메인 메뉴로">메뉴</a>
        </div>
      </div>
      <div class="time-badge">
        <svg width="13" height="13" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1"/>
          <path d="M6 3v3l2 1.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </svg>
        <span id="timestamp-text"></span>
      </div>
      <div class="scene-body" id="scene-body"></div>
    </div>
  </div>

  <!-- 우측 -->
  <div class="right-col">
    <div class="panel" style="flex:0 0 auto;">
      <div class="panel-label">배경 지도</div>
      <div class="map-wrap" id="map-container"></div>
    </div>

    <div class="panel scroll-panel" style="flex:0 0 auto; max-height:230px; min-height:0;">
      <div class="panel-label">동시 진행 사건</div>
      <div class="scroll-inner" id="event-list"></div>
    </div>

    <div class="panel" style="flex:3; display:flex; flex-direction:column; min-height:0;">
      <div class="panel-label">선택지</div>
      <div class="choice-list" id="choice-list"></div>
      <hr class="divider">
      <div class="input-wrap">
        <textarea placeholder="직접 명령을 입력하거나 선택지를 고르세요..." id="cmd" maxlength="2000"></textarea>
        <button class="send-btn" id="send-btn" onclick="submitTurn()" disabled>전송</button>
      </div>
    </div>
  </div>

</div>
</body>
</html>
