  <strong>작업 흐름:</strong>
  레이블 드래그 → 좌표 확정 → "좌표 복사" → 복사된 값으로 SVG 파일 갱신 → PNG export → <code style="background:#1a1714;border:1px solid #2a2420;border-radius:2px;padding:0 4px;color:#8a9878;font-size:10px">map.png</code> 저장.
  세력 마커는 기존 <code style="background:#1a1714;border:1px solid #2a2420;border-radius:2px;padding:0 4px;color:#8a9878;font-size:10px">.map-pin</code> 오버레이 유지.
</p>

<script>
const svg = document.getElementById('map-svg');

// ── 초기 상태 저장 (초기화용) ──────────────────
const origState = new Map();
document.querySelectorAll('.region-label').forEach(el => {
  origState.set(el, {
    x:   parseTranslate(el)[0],
    y:   parseTranslate(el)[1],
    rot: getRotation(el),
    txt: el.querySelector('text').textContent,
  });
});

// ── SVG 좌표 변환 ────────────────────────────────
function svgPoint(evt) {
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

// ── translate 파싱 / 설정 ─────────────────────────
function parseTranslate(el) {
  const m = el.getAttribute('transform')
    .match(/translate\(\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\)/);
  return m ? [parseFloat(m[1]), parseFloat(m[2])] : [0, 0];
}
function setTranslate(el, x, y) {
  el.setAttribute('transform',
    el.getAttribute('transform').replace(
      /translate\([^)]+\)/,
      `translate(${x.toFixed(1)}, ${y.toFixed(1)})`
    ));
}

// ── rotate 파싱 / 설정 (text 요소 기준) ──────────
function getRotation(el) {
  const t = (el.querySelector('text').getAttribute('transform') || '');
  const m = t.match(/rotate\(\s*(-?[\d.]+)\s*\)/);
  return m ? parseFloat(m[1]) : 0;
}
function setRotation(el, angle) {
  const textEl = el.querySelector('text');
  const cur    = textEl.getAttribute('transform') || '';
  const val    = parseFloat(angle.toFixed(1));
  if (cur.includes('rotate(')) {
    textEl.setAttribute('transform', cur.replace(/rotate\([^)]+\)/, `rotate(${val})`));
  } else {
    textEl.setAttribute('transform', cur ? `${cur} rotate(${val})` : `rotate(${val})`);
  }
}

// ── 드래그 / 선택 상태 ───────────────────────────
let active   = null;
let selected = null;
let drag     = null;
let editing  = false;

document.querySelectorAll('.region-label').forEach(el => {
  // 드래그 시작
  el.addEventListener('mousedown', e => {
    if (editing) return;
    e.preventDefault();
    selectLabel(el);
    drag = { startMouse: svgPoint(e), startPos: parseTranslate(el) };
    active = el;
    el.classList.add('dragging');
  });

  // 더블클릭 → 텍스트 편집
  el.addEventListener('dblclick', e => {
    e.preventDefault();
    e.stopPropagation();
    selectLabel(el);
    startEditing(el, e);
  });
});

svg.addEventListener('mousemove', e => {
  if (!active || !drag) return;
  const p = svgPoint(e);
  setTranslate(active,
    drag.startPos[0] + (p.x - drag.startMouse.x),
    drag.startPos[1] + (p.y - drag.startMouse.y));
  updatePanel();
});

window.addEventListener('mouseup', () => {
  if (active) {
    active.classList.remove('dragging');
    active = drag = null;
    updatePanel();
  }
});

// ── 스크롤 → 회전 ────────────────────────────────
svg.addEventListener('wheel', e => {
  if (!selected || editing) return;
  e.preventDefault();
  const step  = e.shiftKey ? 0.5 : 2;
  const delta = e.deltaY > 0 ? step : -step;
  setRotation(selected, getRotation(selected) + delta);
  updatePanel();
}, { passive: false });

// ── 키보드 미세 이동 ─────────────────────────────
window.addEventListener('keydown', e => {
  if (!selected || editing) return;
  const dirs = { ArrowLeft:[-1,0], ArrowRight:[1,0], ArrowUp:[0,-1], ArrowDown:[0,1] };
  const d = dirs[e.key];
  if (!d) return;
  e.preventDefault();
  const step = e.shiftKey ? 10 : 1;
  const [x, y] = parseTranslate(selected);
  setTranslate(selected, x + d[0]*step, y + d[1]*step);
  updatePanel();
});

// ── 레이블 선택 ──────────────────────────────────
function selectLabel(el) {
  if (selected && selected !== el)
    selected.querySelector('text').style.filter = '';
  selected = el;
  el.querySelector('text').style.filter = 'brightness(2.5)';
  updatePanel();
}

document.getElementById('coord-panel').addEventListener('click', e => {
  const row = e.target.closest('.coord-row');
  if (!row) return;
  const el = document.querySelector(`.region-label[data-name="${row.dataset.name}"]`);
  if (el) selectLabel(el);
});

// ── 텍스트 편집 (더블클릭) ───────────────────────
function startEditing(el, evt) {
  editing = true;
  const textEl = el.querySelector('text');

  const inp = document.createElement('input');
  inp.type  = 'text';
  inp.value = textEl.textContent;

  Object.assign(inp.style, {
    position:     'fixed',
    left:         `${evt.clientX - 80}px`,
    top:          `${evt.clientY - 14}px`,
    width:        '200px',
    fontFamily:   "'Palatino Linotype', Palatino, serif",
    fontStyle:    'italic',
    fontSize:     '13px',
    background:   'rgba(8,6,4,0.95)',
    color:        '#c8b890',
    border:       '1px solid #5a4e38',
    borderRadius: '2px',
    padding:      '3px 8px',
    outline:      'none',
    zIndex:       '9999',
    letterSpacing:'0.05em',
    boxShadow:    '0 2px 12px rgba(0,0,0,0.7)',
  });

  document.body.appendChild(inp);
  inp.focus();
  inp.select();

  let done = false;
  function commit() {
    if (done) return; done = true;
    const val = inp.value.trim();
    if (val) textEl.textContent = val;
    inp.remove();
    editing = false;
    updatePanel();
  }
  function cancel() {
    if (done) return; done = true;
    inp.remove();
    editing = false;
  }

  inp.addEventListener('keydown', e => {
    e.stopPropagation(); // 방향키가 레이블 이동을 트리거하지 않도록
    if (e.key === 'Enter')  { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { cancel(); }
  });
  inp.addEventListener('blur', commit);
}

// ── 좌표 패널 갱신 ───────────────────────────────
function updatePanel() {
  document.getElementById('coord-panel').innerHTML =
    Array.from(document.querySelectorAll('.region-label')).map(el => {
      const [x, y] = parseTranslate(el);
      const rot    = getRotation(el);
      const name   = el.dataset.name;
      const rotStr = rot !== 0 ? ` · ${rot > 0 ? '+' : ''}${Math.round(rot)}°` : '';
      return `<div class="coord-row${el === selected ? ' active' : ''}" data-name="${name}">
        <span class="coord-name">${name}</span>
        <span class="coord-val">${Math.round(x)}, ${Math.round(y)}${rotStr}</span>
      </div>`;
    }).join('');
}

// ── 좌표 복사 ────────────────────────────────────
function copyCode() {
  const lines = Array.from(document.querySelectorAll('.region-label')).map(el => {
    const [x, y] = parseTranslate(el);
    const rot    = getRotation(el);
    const name   = el.dataset.name;
    const txt    = el.querySelector('text').textContent;
    const rotPart = rot !== 0 ? `  rotate(${Math.round(rot)})` : '';
    return `<!-- ${name} -->\ntranslate(${Math.round(x)}, ${Math.round(y)})${rotPart}  "${txt}"`;
  });
  const text = lines.join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '복사됨 ✓';
    btn.classList.add('success');
    setTimeout(() => {
      btn.textContent = '좌표 복사 (SVG 코드)';
      btn.classList.remove('success');
    }, 1800);
  });

  const out = document.getElementById('code-output');
  out.style.display = 'block';
  out.textContent = text;
}

// ── 전체 초기화 ──────────────────────────────────
function resetAll() {
  origState.forEach(({ x, y, rot, txt }, el) => {
    setTranslate(el, x, y);
    setRotation(el, rot);
    el.querySelector('text').textContent = txt;
  });
  if (selected) {
    selected.querySelector('text').style.filter = '';
    selected = null;
  }
  updatePanel();
  document.getElementById('code-output').style.display = 'none';
}

// ── 초기 렌더 ────────────────────────────────────
updatePanel();
</script>
</body>
</html>
